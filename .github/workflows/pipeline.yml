name: Pipeline Automatizado

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  CI-ContinuosIntegration:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Make new a .env file
        uses: SpicyPizza/create-envfile@v2.0.3
        with:
          envkey_PORT: 5000
          envkey_POSTGRES_PASSWORD: 06032026
          envkey_POSTGRES_USER: postgres
          envkey_POSTGRES_DB: tests
          envkey_DATABASE_URL: "postgresql://postgres:06032026@localhost:5432/tests"
          directory: .
          file_name: .env.test
          fail_on_empty: false

      - name: Install Dependencies
        run: npm install

      - name: Run tests
        run: |
          docker compose -f docker-compose-test.yml up --build --exit-code-from backend

  CD-PublishToDockerHub:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    needs: CI-ContinuosIntegration
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.dev
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/bingo-backend:latest

  CD-DeployToRender:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: CD-PublishToDockerHub
    steps:
      - name: Deploy to production
        uses: johnbeynon/render-deploy-action@v0.0.8
        with:
          service-id: ${{ secrets.SERVICE_ID }}
          api-key: ${{ secrets.RENDER_API_KEY }}